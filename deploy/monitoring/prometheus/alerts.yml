groups:
  - name: crispr-marathon
    rules:
      - alert: CrisprAppDown
        expr: up{job="crispr-marathon"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CRISPR dashboard is down"
          description: "Prometheus cannot scrape the app metrics endpoint."

      - alert: CrisprHighCpu
        expr: avg_over_time(crispr_system_cpu_usage_percent[5m]) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage has been above 90% for 5 minutes."

      - alert: CrisprHighMemory
        expr: avg_over_time(crispr_system_memory_usage_percent[5m]) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage has been above 90% for 10 minutes."

      - alert: CrisprHighDisk
        expr: avg_over_time(crispr_system_disk_usage_percent[10m]) > 90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Primary disk usage has been above 90% for 30 minutes."

      - alert: CrisprHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(crispr_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95)"
          description: "p95 request latency has been above 1s for 10 minutes."
