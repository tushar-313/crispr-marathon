global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # App metrics. By default this assumes the app is reachable from Prometheus.
  # If you run the app outside Docker, set APP_METRICS_TARGET in alerts.yml and
  # update this target accordingly (e.g. host.docker.internal:8000).
  - job_name: crispr-marathon
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8000"]
