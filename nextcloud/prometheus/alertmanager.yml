global:
  resolve_timeout: 5m

route:
  receiver: chatops
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: chatops
      repeat_interval: 30m

receivers:
  - name: chatops
    webhook_configs:
      - url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        max_alerts: 10
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: >-
          <b>[{{ .Status | toUpper }}]</b> {{ .CommonLabels.alertname }}
          
          {{ .CommonAnnotations.summary }}
          
          Severity: {{ .CommonLabels.severity }}
          Service: {{ .CommonLabels.service }}
