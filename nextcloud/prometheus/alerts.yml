groups:
  - name: nextcloud-availability
    rules:
      - alert: NextcloudDown
        expr: probe_success{job="blackbox_nextcloud"} == 0
        for: 2m
        labels:
          severity: critical
          service: nextcloud
        annotations:
          summary: "Nextcloud health endpoint is down"
          description: "Blackbox probe to Nextcloud status endpoint has failed for 2 minutes."

      - alert: NextcloudProbeSlow
        expr: probe_duration_seconds{job="blackbox_nextcloud"} > 2
        for: 5m
        labels:
          severity: warning
          service: nextcloud
        annotations:
          summary: "Nextcloud probe latency is high"
          description: "Probe duration is above 2s for 5 minutes."

  - name: host-health
    rules:
      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: node-exporter
        annotations:
          summary: "Node exporter is down"
          description: "Prometheus cannot scrape node exporter on the host."

      - alert: HighCPUUsage
        expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 85
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "High CPU usage"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: HighMemoryUsage
        expr: ((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100) > 90
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "High memory usage"
          description: "Memory usage has been above 90% for 10 minutes."

      - alert: DiskSpaceLow
        expr: (100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} * 100) / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) > 85
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "Disk usage is high on root filesystem"
          description: "Disk usage on / is above 85% for 10 minutes."

  - name: container-health
    rules:
      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 2m
        labels:
          severity: warning
          service: cadvisor
        annotations:
          summary: "cAdvisor is down"
          description: "Prometheus cannot scrape cAdvisor metrics."
